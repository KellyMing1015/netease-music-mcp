<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎵 netease-music-mcp demo</title>
<style>
:root {
  --bg: #0f0d14;
  --card: #1a1820;
  --text: #e8e2f0;
  --dim: rgba(232,226,240,0.45);
  --accent: #9b7fe8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── demo page layout ── */
.demo-wrap {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 20px calc(var(--safe-bottom) + 100px);
  width: 100%;
}
.demo-header { text-align: center; padding: 40px 0 32px; }
.demo-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.demo-header p { color: var(--dim); font-size: 0.88rem; line-height: 1.6; }
.demo-search {
  display: flex; gap: 10px; margin-bottom: 32px;
}
.demo-search input {
  flex: 1; background: var(--card); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 12px 16px; color: var(--text);
  font-size: 0.95rem; font-family: inherit; outline: none;
}
.demo-search input::placeholder { color: var(--dim); }
.demo-search button {
  background: var(--accent); border: none; border-radius: 14px;
  padding: 12px 20px; color: white; font-size: 0.9rem;
  font-family: inherit; cursor: pointer; font-weight: 600; flex-shrink: 0;
}
.demo-search button:active { opacity: 0.8; }
.demo-results { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.demo-result-row {
  background: var(--card); border-radius: 14px;
  padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
}
.demo-result-row:active { opacity: 0.7; }
.demo-result-cover {
  width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
  background: rgba(255,255,255,0.08);
}
.demo-result-info { flex: 1; min-width: 0; }
.demo-result-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.demo-result-artist { font-size: 0.73rem; color: var(--dim); margin-top: 2px; }
.demo-play-btn {
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.demo-play-btn svg { fill: white; width: 14px; height: 14px; margin-left: 2px; }
.demo-section-label {
  font-size: 0.72rem; color: var(--dim); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 12px; padding-left: 4px;
}
.demo-note {
  text-align: center; color: var(--dim); font-size: 0.8rem;
  padding: 20px; line-height: 1.7;
}
.demo-note a { color: var(--accent); text-decoration: none; }

/* ── music card ── */
.music-card {
  border-radius: 18px; overflow: hidden; position: relative;
  width: 100%; cursor: pointer; user-select: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.music-card-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  filter: blur(40px) brightness(0.4) saturate(1.6); transform: scale(1.2); z-index: 0;
}
.music-card-inner {
  position: relative; z-index: 1; padding: 18px 16px;
  display: flex; align-items: center; gap: 12px; min-height: 90px;
}
.music-card-info { flex: 1; min-width: 0; }
.music-card-tag { font-size: 0.6rem; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; margin-bottom: 6px; }
.music-card-name { font-size: 1.05rem; font-weight: 700; color: white; line-height: 1.2; }
.music-card-artist { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 3px; }
.music-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.music-card-disc {
  width: 56px; height: 56px; border-radius: 50%; overflow: hidden;
  position: relative; flex-shrink: 0;
}
.music-card-disc-base {
  position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(#1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
}
.music-card-disc-grooves {
  position: absolute; inset: 3px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 0 0 3px rgba(255,255,255,0.03), 0 0 0 6px rgba(255,255,255,0.02);
}
.music-card-disc-hole {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: #111; top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.music-card-cover {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; border-radius: 50%;
}
.music-card-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content:center;
}
.music-card-btn svg { fill: white; width: 13px; height: 13px; margin-left: 2px; }
.music-card-progress {
  position: absolute; bottom: 0; left: 0; height: 2px;
  background: rgba(255,255,255,0.6); border-radius: 1px; transition: width 0.25s linear;
}

/* ── lyric player ── */
#lyricPlayer {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 99999; background: #111;
  flex-direction: column; align-items: center; box-sizing: border-box;
}
#lyricPlayer.open { display: flex; }
#lyricPlayer .lp-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  filter: blur(60px) brightness(0.35) saturate(1.4); transform: scale(1.1); z-index: 0;
}
#lyricPlayer .lp-content {
  position: relative; z-index: 1; display: flex; flex-direction: column;
  align-items: center; width: 100%; max-width: 480px; flex: 1; overflow: hidden;
}
#lpInnerWrap {
  display: flex; flex-direction: column; width: 100%; flex: 1; overflow: hidden;
  padding: calc(var(--safe-top) + 12px) 20px 0;
}
#lpLyricsInner { display: flex; flex-direction: column; align-items: center; padding: 40px 0 60px; }
#lpLyricsInner .lp-line {
  text-align: center; padding: 10px 0; cursor: pointer;
  transition: opacity 0.3s, transform 0.3s; opacity: 0.3;
  font-size: 0.95rem; color: white; line-height: 1.5;
}
#lpLyricsInner .lp-line.active { opacity: 1; transform: scale(1.06); font-weight: 600; }
#lpLyricsInner .lp-trans { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
#lpInputBar {
  padding: 8px 16px calc(var(--safe-bottom) + 8px);
  background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
  display: flex; gap: 10px; align-items: center; width: 100%; flex-shrink: 0;
}
#lpChatInput {
  flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; padding: 10px 16px; color: white;
  font-size: 0.9rem; font-family: inherit; outline: none; resize: none;
}
#lpChatInput::placeholder { color: rgba(255,255,255,0.3); }

/* ── mini player ── */
#miniPlayer {
  display: none; position: fixed; bottom: var(--safe-bottom);
  left: 0; right: 0; z-index: 9999;
  background: var(--card); border-top: 1px solid rgba(255,255,255,0.06);
  flex-direction: column; box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
#miniPlayer.visible { display: flex; }
.mini-progress-bar {
  height: 2px; background: rgba(255,255,255,0.12); width: 100%;
}
.mini-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.25s linear; }
.mini-inner {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px 10px; cursor: pointer;
}
.mini-disc {
  width: 32px; height: 32px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
  background: rgba(255,255,255,0.08); position: relative;
}
.mini-disc img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.mini-disc-spin {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  animation: spin 4s linear infinite; animation-play-state: paused;
}
.mini-info { flex: 1; min-width: 0; }
.mini-title { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-artist { font-size: 0.68rem; color: var(--dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-btn { background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; padding: 4px; flex-shrink: 0; }

/* ── keyframes ── */
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes disc-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Demo Page ── -->
<div class="demo-wrap">
  <div class="demo-header">
    <h1>🎵 netease-music-mcp</h1>
    <p>搜一首歌试试看<br><span style="color:var(--dim);font-size:0.8rem;">连接到本地 API Server 运行</span></p>
  </div>

  <div class="demo-search">
    <input id="searchInput" type="text" placeholder="搜索歌曲、艺术家…" value="方大同 才二十三">
    <button onclick="doSearch()">搜</button>
  </div>

  <div id="searchResults" class="demo-results"></div>

  <div id="nowPlayingCard" style="margin-bottom:24px;display:none;"></div>

  <div id="demoNote" class="demo-note">
    输入歌名或艺术家，点搜索试试 🎧<br>
    <a href="https://github.com/Cheiineeey/netease-music-mcp" target="_blank">GitHub →</a>
  </div>
</div>

<!-- ── Lyric Player ── -->
<div id="lyricPlayer">
  <div class="lp-bg" id="lpBg"></div>
  <div class="lp-content">
    <div id="lpInnerWrap">
      <!-- Top bar -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <button onclick="closeLyricPlayer()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6);font-size:1rem;padding:8px;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;">✕</button>
        <div style="display:flex;gap:8px;">
          <button onclick="togglePlaylistBrowser()" style="background:rgba(255,255,255,0.08);border:none;border-radius:20px;color:rgba(255,255,255,0.65);font-size:0.68rem;padding:5px 11px;cursor:pointer;">≡ 歌单</button>
        </div>
      </div>

      <!-- Song info + disc -->
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.68rem;color:rgba(255,255,255,0.4);letter-spacing:0.08em;margin-bottom:10px;">♫ 正在播放</div>
          <h2 id="lpTitle" style="margin:0 0 6px;font-size:1.35rem;font-weight:700;color:white;line-height:1.2;">—</h2>
          <p id="lpArtist" style="margin:0;font-size:0.8rem;color:rgba(255,255,255,0.5);">—</p>
          <!-- Progress -->
          <div style="margin-top:20px;">
            <div id="lpProgressBar" style="width:100%;height:20px;display:flex;align-items:center;cursor:pointer;position:relative;touch-action:none;">
              <div style="width:100%;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;position:relative;">
                <div id="lpProgressFill" style="height:100%;background:white;border-radius:2px;width:0%;transition:width 0.1s linear;position:relative;">
                  <div id="lpProgressThumb" style="position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.4);opacity:0;transition:opacity 0.15s;"></div>
                </div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span id="lpTimer" style="font-size:0.65rem;color:rgba(255,255,255,0.4);">0:00</span>
              <span id="lpDuration" style="font-size:0.65rem;color:rgba(255,255,255,0.25);">—</span>
            </div>
          </div>
          <!-- Controls -->
          <div style="display:flex;align-items:center;gap:16px;margin-top:14px;">
            <button onclick="lpPrev()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);padding:4px;display:flex;align-items:center;justify-content:center;">
              <svg viewBox="0 0 24 24" style="fill:rgba(255,255,255,0.5);width:22px;height:22px;"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button id="lpPlayBtn" onclick="lpToggle()" style="width:46px;height:46px;border-radius:50%;background:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.4);flex-shrink:0;">
              <svg viewBox="0 0 24 24" style="fill:#111;width:18px;height:18px;margin-left:2px;"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button onclick="lpNext()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);padding:4px;display:flex;align-items:center;justify-content:center;">
              <svg viewBox="0 0 24 24" style="fill:rgba(255,255,255,0.5);width:22px;height:22px;"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8z"/></svg>
            </button>
            <div style="flex:1;"></div>
            <button onclick="togglePlaylistBrowser()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);padding:4px;display:flex;align-items:center;justify-content:center;">
              <svg viewBox="0 0 24 24" style="fill:rgba(255,255,255,0.35);width:20px;height:20px;"><path d="M4 6h14v2H4zm0 4h14v2H4zm0 4h10v2H4zm12 0v6l5-3z"/></svg>
            </button>
          </div>
        </div>
        <!-- Disc -->
        <div id="lpDisc" style="width:90px;height:90px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0;">
          <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#1a1a1a 0%,#2a2a2a 50%,#1a1a1a 100%);"></div>
          <div style="position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,0.04);"></div>
          <img id="lpCover" src="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
          <div style="position:absolute;width:12px;height:12px;border-radius:50%;background:#111;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
        </div>
      </div>

      <!-- Lyrics -->
      <div id="lpLyrics" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;">
        <div id="lpLyricsInner"></div>
      </div>
    </div>

    <!-- Input bar -->
    <div id="lpInputBar">
      <input id="lpChatInput" type="text" placeholder="搜下一首…" onkeydown="if(event.key==='Enter'){lpSearchFromInput();}">
      <button onclick="lpSearchFromInput()" style="background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
        <svg viewBox="0 0 24 24" style="fill:white;width:16px;height:16px;"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Mini Player ── -->
<div id="miniPlayer" onclick="openLyricPlayerFromMini()">
  <div class="mini-progress-bar"><div id="miniProgressFill" class="mini-progress-fill"></div></div>
  <div class="mini-inner">
    <div class="mini-disc">
      <img id="miniPlayerCover" src="">
      <div id="miniPlayerDiscAnim" class="mini-disc-spin"></div>
    </div>
    <div class="mini-info">
      <div id="miniPlayerTitle" class="mini-title">—</div>
      <div id="miniPlayerArtist" class="mini-artist">—</div>
    </div>
    <button class="mini-btn" onclick="event.stopPropagation();miniPlayerToggle();" id="miniPlayerBtn">▶</button>
  </div>
</div>

<!-- ── Playlist Browser ── -->
<div id="playlistBrowserOverlay" onclick="togglePlaylistBrowser()" style="display:none;position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,0.5);"></div>
<div id="playlistBrowser" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:100002;max-height:65vh;background:linear-gradient(180deg,#1a1a2e 0%,#16161d 100%);border-radius:18px 18px 0 0;overflow:hidden;flex-direction:column;">
  <div style="padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between;">
    <div id="plBrowserTitle" style="font-size:1rem;font-weight:700;color:white;">我的歌单</div>
    <button onclick="togglePlaylistBrowser()" style="background:none;border:none;color:rgba(255,255,255,0.45);font-size:1rem;cursor:pointer;padding:4px 8px;">✕</button>
  </div>
  <div id="plBrowserBack" onclick="plBrowserShowList()" style="display:none;padding:0 20px 8px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:0.75rem;">← 返回歌单列表</div>
  <div id="plBrowserContent" style="flex:1;overflow-y:auto;padding:8px 16px 24px;-webkit-overflow-scrolling:touch;"></div>
</div>

<script>
// ── Config ── Edit these to match your setup
const API_BASE = 'http://localhost:3457';
const AUTH_TOKEN = 'changeme';

function apiHeaders() {
  return { 'Authorization': 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' };
}

// ── Player State ──
var _lp = { id: null, name: '', artist: '', pic: '', lines: [], tlines: [], elapsed: 0, playing: false, timer: null, activeIdx: -1 };
var _lpGen = 0;
var _lpQueue = null;
var _chatCardQueue = [];

// ── Search ──
async function doSearch() {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  var res = document.getElementById('searchResults');
  res.innerHTML = '<div style="text-align:center;color:var(--dim);padding:20px;">搜索中…</div>';
  document.getElementById('demoNote').style.display = 'none';
  try {
    var r = await fetch(API_BASE + '/api/music/search?q=' + encodeURIComponent(q), { headers: apiHeaders() });
    var songs = await r.json();
    res.innerHTML = '';
    if (!songs.length) { res.innerHTML = '<div style="text-align:center;color:var(--dim);padding:20px;">没找到，换个关键词？</div>'; return; }
    songs.forEach(function(s) {
      var row = document.createElement('div');
      row.className = 'demo-result-row';
      row.innerHTML = '<img class="demo-result-cover" src="' + (s.pic||'') + '" onerror="this.style.display=\'none\'">'
        + '<div class="demo-result-info"><div class="demo-result-name">' + esc(s.name) + '</div><div class="demo-result-artist">' + esc(s.artist) + '</div></div>'
        + '<button class="demo-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>';
      row.onclick = function() { playSong(s); };
      res.appendChild(row);
      // Add to queue
      if (!_chatCardQueue.find(function(c){ return String(c.id) === String(s.id); })) {
        _chatCardQueue.push({ id: String(s.id), name: s.name, artist: s.artist, pic: s.pic, play_url: s.play_url });
      }
    });
  } catch(e) {
    res.innerHTML = '<div style="text-align:center;color:var(--dim);padding:20px;">连接失败，API Server 在跑吗？</div>';
  }
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Play ──
async function playSong(song) {
  openLyricPlayer(song.id, song.name, song.artist, song.pic, song.play_url || '');
}

// ── Lyric Player ──
window.openLyricPlayer = async function(id, name, artist, pic, playUrl) {
  _lpGen++;
  var myGen = _lpGen;

  if (_lp.id) { _lp.elapsed = window._lpAudio ? window._lpAudio.currentTime : _lp.elapsed; }
  if (window._lpAudio) { window._lpAudio.pause(); window._lpAudio = null; }
  clearInterval(_lp.timer); _lp.timer = null;

  _lp.id = id; _lp.name = name||''; _lp.artist = artist||''; _lp.pic = pic||'';
  _lp.elapsed = 0; _lp.playing = false; _lp.activeIdx = -1; _lp.lines = []; _lp.tlines = [];

  document.getElementById('lpTitle').textContent = name || '—';
  document.getElementById('lpArtist').textContent = artist || '—';
  document.getElementById('lpDuration').textContent = '—';
  document.getElementById('lpTimer').textContent = '0:00';
  document.getElementById('lpProgressFill').style.width = '0%';
  document.getElementById('lpLyricsInner').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.25);padding:40px;font-size:0.85rem;">加载歌词中…</div>';

  var cover = document.getElementById('lpCover');
  if (pic) { cover.src = pic; cover.style.display = 'block'; } else { cover.style.display = 'none'; }
  document.querySelector('.lp-bg').style.backgroundImage = pic ? 'url(' + pic + ')' : '';
  document.getElementById('lyricPlayer').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Load lyrics
  try {
    var lr = await fetch(API_BASE + '/api/music/lyric?id=' + id, { headers: apiHeaders() });
    var ld = await lr.json();
    if (myGen !== _lpGen) return;
    _lp.lines = parseLrc(ld.lyric || '');
    _lp.tlines = parseLrc(ld.tlyric || '');
    renderLyrics();
  } catch(e) {}

  // Get play URL
  var freshUrl = playUrl || '';
  try {
    if (!freshUrl && id) {
      var ur = await fetch(API_BASE + '/api/music/url?id=' + id, { headers: apiHeaders() });
      var ud = await ur.json();
      if (ud.url) freshUrl = ud.url;
    }
  } catch(e) {}

  if (myGen !== _lpGen) return;
  if (!freshUrl) { document.getElementById('lpLyricsInner').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">无法获取播放链接</div>'; return; }

  var audio = new Audio(API_BASE + '/api/music/proxy?url=' + encodeURIComponent(freshUrl));
  window._lpAudio = audio;
  audio.addEventListener('ended', function() { if (window._lpAudio === audio) _lpAutoNext(); });
  audio.oncanplay = function() {
    if (myGen !== _lpGen) { audio.pause(); return; }
    audio.play().catch(function(){});
    _lp.playing = true;
    if (_lp.timer) clearInterval(_lp.timer);
    lpStart();
    _miniSync();
  };
  audio.onloadedmetadata = function() {
    var d = audio.duration;
    if (!isNaN(d)) document.getElementById('lpDuration').textContent = Math.floor(d/60)+':'+(Math.floor(d%60)<10?'0':'')+Math.floor(d%60);
  };
  audio.load();
  _miniSync();
};

window.closeLyricPlayer = function() {
  if (_lp.id && window._lpAudio) { _lp.elapsed = window._lpAudio.currentTime; }
  document.getElementById('lyricPlayer').classList.remove('open');
  document.body.style.overflow = '';
  clearInterval(_lp.timer);
};

function parseLrc(lrc) {
  if (!lrc) return [];
  var lines = [];
  lrc.split('\n').forEach(function(line) {
    var m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if (m) lines.push({ t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() });
  });
  return lines.sort(function(a,b){ return a.t - b.t; });
}

function renderLyrics() {
  var inner = document.getElementById('lpLyricsInner');
  if (!_lp.lines.length) {
    inner.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.25);padding:40px;">暂无歌词</div>';
    return;
  }
  inner.innerHTML = '';
  _lp.lines.forEach(function(line, i) {
    var div = document.createElement('div');
    div.className = 'lp-line';
    div.dataset.idx = i;
    div.innerHTML = '<div>' + esc(line.text) + '</div>';
    if (_lp.tlines[i]) {
      var tr = document.createElement('div');
      tr.className = 'lp-trans'; tr.textContent = _lp.tlines[i].text;
      div.appendChild(tr);
    }
    div.onclick = function() { lpSeekTo(line.t); };
    inner.appendChild(div);
  });
}

window._lpTick = function() {
  if (window._lpAudio && !window._lpAudio.paused && !isNaN(window._lpAudio.currentTime) && window._lpAudio.currentTime > 0) {
    _lp.elapsed = window._lpAudio.currentTime;
  }
  var m = Math.floor(_lp.elapsed/60), s = Math.floor(_lp.elapsed%60);
  var el = document.getElementById('lpTimer');
  if (el) el.textContent = m+':'+(s<10?'0':'')+s;
  var dur = window._lpAudio && !isNaN(window._lpAudio.duration) ? window._lpAudio.duration : 0;
  var pct = dur > 0 ? (_lp.elapsed / dur * 100) : 0;
  var fill = document.getElementById('lpProgressFill');
  if (fill) fill.style.width = pct + '%';
  // Mini progress
  var mf = document.getElementById('miniProgressFill');
  if (mf) mf.style.width = pct + '%';
  // Lyrics
  if (_lp.lines.length) {
    var idx = -1;
    for (var i = 0; i < _lp.lines.length; i++) {
      if (_lp.lines[i].t <= _lp.elapsed + 0.3) idx = i; else break;
    }
    if (idx !== _lp.activeIdx) {
      _lp.activeIdx = idx;
      var inner = document.getElementById('lpLyricsInner');
      if (inner) {
        Array.from(inner.children).forEach(function(c, i) {
          c.classList.toggle('active', i === idx);
        });
        if (idx >= 0 && inner.children[idx]) {
          inner.children[idx].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
    }
  }
};

function lpStart() {
  if (_lp.timer) clearInterval(_lp.timer);
  _lp.playing = true;
  _lp.timer = setInterval(function() {
    if (window._lpAudio && !window._lpAudio.paused) {
      _lpTick();
    }
  }, 250);
  _lpTick();
}

window.lpToggle = function() {
  if (!window._lpAudio) return;
  var btn = document.getElementById('lpPlayBtn');
  if (window._lpAudio.paused) {
    window._lpAudio.play().catch(function(){});
    lpStart();
    _lp.playing = true;
    btn.innerHTML = '<svg viewBox="0 0 24 24" style="fill:#111;width:22px;height:22px;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  } else {
    window._lpAudio.pause();
    clearInterval(_lp.timer); _lp.timer = null;
    _lp.playing = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" style="fill:#111;width:18px;height:18px;margin-left:2px;"><path d="M8 5v14l11-7z"/></svg>';
  }
  _miniSync();
};

window.lpSeekTo = function(t) {
  _lp.elapsed = t;
  if (window._lpAudio && !isNaN(window._lpAudio.duration)) window._lpAudio.currentTime = t;
  if (!_lp.playing) lpStart();
  _lpTick();
};

window.lpSeek = function(d) { _lp.elapsed = Math.max(0, _lp.elapsed + d); _lpTick(); };

// Progress bar drag
;(function() {
  var _dragging = false;
  function _pct(e, bar) {
    var rect = bar.getBoundingClientRect();
    var x = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (x - rect.left) / rect.width));
  }
  function _seek(pct) {
    if (!window._lpAudio || isNaN(window._lpAudio.duration)) return;
    lpSeekTo(pct * window._lpAudio.duration);
  }
  function showThumb(v) { var t = document.getElementById('lpProgressThumb'); if(t) t.style.opacity = v?'1':'0'; }
  document.addEventListener('touchstart', function(e) {
    var bar = document.getElementById('lpProgressBar');
    if (!bar || !bar.contains(e.target)) return;
    _dragging = true; showThumb(true); _seek(_pct(e, bar)); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', function(e) {
    if (!_dragging) return;
    var bar = document.getElementById('lpProgressBar');
    if (bar) _seek(_pct(e, bar)); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', function() { if (!_dragging) return; _dragging = false; setTimeout(function(){ showThumb(false); }, 600); });
  document.addEventListener('mousedown', function(e) {
    var bar = document.getElementById('lpProgressBar');
    if (!bar || !bar.contains(e.target)) return;
    _dragging = true; showThumb(true); _seek(_pct(e, bar));
  });
  document.addEventListener('mousemove', function(e) {
    if (!_dragging) return;
    var bar = document.getElementById('lpProgressBar');
    if (bar) _seek(_pct(e, bar));
  });
  document.addEventListener('mouseup', function() { if (!_dragging) return; _dragging = false; setTimeout(function(){ showThumb(false); }, 600); });
})();

// ── Queue & Next/Prev ──
window._lpGetQueue = function() {
  var curId = String(_lp.id || '');
  if (_lpQueue && _lpQueue.songs && _lpQueue.songs.length) {
    var inQ = _lpQueue.songs.findIndex(function(s){ return String(s.id) === curId; }) >= 0;
    if (inQ) return { songs: _lpQueue.songs, getIdx: function(id){ return _lpQueue.songs.findIndex(function(s){ return String(s.id)===String(id); }); }, fromPlaylist: true };
  }
  return { songs: _chatCardQueue, getIdx: function(id){ return _chatCardQueue.findIndex(function(s){ return String(s.id)===String(id); }); }, fromPlaylist: false };
};

window.lpNext = function() {
  var q = _lpGetQueue();
  var idx = q.getIdx(_lp.id);
  if (idx < 0 || idx >= q.songs.length - 1) return;
  var next = q.songs[idx + 1];
  if (q.fromPlaylist) _lpQueue.index = idx + 1;
  openLyricPlayer(next.id, next.name, next.artist, next.pic, next.play_url || '');
};

window.lpPrev = function() {
  var q = _lpGetQueue();
  var idx = q.getIdx(_lp.id);
  if (idx <= 0) return;
  var prev = q.songs[idx - 1];
  openLyricPlayer(prev.id, prev.name, prev.artist, prev.pic, prev.play_url || '');
};

function _lpAutoNext() {
  setTimeout(_miniSync, 200);
  var q = _lpGetQueue && _lpGetQueue();
  if (!q || !q.songs || q.songs.length <= 1) return;
  var curId = String(_lp.id || '');
  var idx = -1;
  for (var i = 0; i < q.songs.length; i++) {
    if (String(q.songs[i].id || q.songs[i].song_id || '') === curId) { idx = i; break; }
  }
  if (idx < 0 || idx >= q.songs.length - 1) return;
  var next = q.songs[idx + 1];
  if (_lpQueue) _lpQueue.index = idx + 1;

  var nextId = String(next.id||next.song_id||'');
  var nextName = next.name||next.song_name||'';
  var nextArt = next.artist||'';
  var nextPic = next.pic||next.cover_url||'';
  var lpWasOpen = document.getElementById('lyricPlayer').style.display === 'flex';

  // iOS autoplay fix: create audio synchronously before any await
  if (window._lpAudio) { window._lpAudio.pause(); window._lpAudio = null; }
  clearInterval(_lp.timer); _lp.timer = null;
  _lp.id = nextId; _lp.name = nextName; _lp.artist = nextArt; _lp.pic = nextPic;
  _lp.elapsed = 0; _lp.playing = false; _lp.activeIdx = -1; _lp.lines = []; _lp.tlines = [];

  var audio = new Audio();
  audio.preload = 'auto';
  window._lpAudio = audio;
  audio.addEventListener('ended', function() { if (window._lpAudio === audio) _lpAutoNext(); });

  if (lpWasOpen) {
    document.getElementById('lpTitle').textContent = nextName;
    document.getElementById('lpArtist').textContent = nextArt;
    document.getElementById('lpTimer').textContent = '0:00';
    document.getElementById('lpDuration').textContent = '—';
    document.getElementById('lpProgressFill').style.width = '0%';
    var covEl = document.getElementById('lpCover');
    if (nextPic) { covEl.src = nextPic; covEl.style.display='block'; } else { covEl.style.display='none'; }
    document.getElementById('lpBg').style.backgroundImage = nextPic ? 'url('+nextPic+')' : '';
    document.getElementById('lpLyricsInner').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.25);padding:40px;">加载中…</div>';
  }

  (async function() {
    try {
      var ur = await fetch(API_BASE+'/api/music/url?id='+encodeURIComponent(nextId), {headers:apiHeaders()}).then(function(r){return r.json();});
      if (window._lpAudio !== audio) return;
      if (!ur.url) return;
      audio.src = API_BASE+'/api/music/proxy?url='+encodeURIComponent(ur.url);
      audio.oncanplay = function() {
        if (window._lpAudio !== audio) { audio.pause(); return; }
        fetch(API_BASE+'/api/music/played?id='+encodeURIComponent(nextId), {headers:apiHeaders()}).catch(function(){});
        audio.play().catch(function(){}); lpStart(); _miniSync();
      };
      audio.onloadedmetadata = function() {
        var d = audio.duration;
        if (!isNaN(d) && lpWasOpen) document.getElementById('lpDuration').textContent = Math.floor(d/60)+':'+(Math.floor(d%60)<10?'0':'')+Math.floor(d%60);
      };
      audio.load();
    } catch(e) {}
    if (!lpWasOpen) return;
    try {
      var lr = await fetch(API_BASE+'/api/music/lyric?id='+nextId, {headers:apiHeaders()}).then(function(r){return r.json();});
      if (window._lpAudio !== audio) return;
      _lp.lines = parseLrc(lr.lyric||''); _lp.tlines = parseLrc(lr.tlyric||'');
      renderLyrics();
    } catch(e) {}
  })();
}

// ── Mini Player ──
function _miniSync() {
  var mp = document.getElementById('miniPlayer');
  if (!mp) return;
  var alive = window._lpAudio && !window._lpAudio.ended;
  mp.classList.toggle('visible', !!alive);
  if (!alive) return;
  document.getElementById('miniPlayerTitle').textContent = _lp.name || '—';
  document.getElementById('miniPlayerArtist').textContent = _lp.artist || '—';
  var c = document.getElementById('miniPlayerCover');
  if (_lp.pic && c.src !== _lp.pic) c.src = _lp.pic;
  var playing = !window._lpAudio.paused;
  document.getElementById('miniPlayerBtn').textContent = playing ? '⏸' : '▶';
  document.getElementById('miniPlayerDiscAnim').style.animationPlayState = playing ? 'running' : 'paused';
}
setInterval(_miniSync, 800);

window.openLyricPlayerFromMini = function() {
  if (!_lp.id) return;
  openLyricPlayer(_lp.id, _lp.name, _lp.artist, _lp.pic, '');
};

window.miniPlayerToggle = function() {
  if (!window._lpAudio) return;
  if (window._lpAudio.paused) {
    window._lpAudio.play().catch(function(){});
    _lp.playing = true; lpStart();
  } else {
    window._lpAudio.pause(); _lp.playing = false;
    clearInterval(_lp.timer); _lp.timer = null;
  }
  setTimeout(_miniSync, 50);
};

// visibility change sync
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && window._lpAudio && !window._lpAudio.paused && !isNaN(window._lpAudio.currentTime)) {
    _lp.elapsed = window._lpAudio.currentTime;
    _lpTick();
  }
  if (!document.hidden) setTimeout(_miniSync, 50);
});

// keyboard resize — re-center lyrics
;(function() {
  var _t = null;
  function reScroll() {
    if (_lp.activeIdx < 0) return;
    var inner = document.getElementById('lpLyricsInner');
    if (!inner || !inner.children[_lp.activeIdx]) return;
    inner.children[_lp.activeIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
  if (window.visualViewport) window.visualViewport.addEventListener('resize', function(){ clearTimeout(_t); _t = setTimeout(reScroll, 150); });
  window.addEventListener('resize', function(){ clearTimeout(_t); _t = setTimeout(reScroll, 150); });
  var ci = document.getElementById('lpChatInput');
  if (ci) ci.addEventListener('focus', function(){ setTimeout(reScroll, 300); });
})();

// ── Playlist Browser ──
window.togglePlaylistBrowser = function() {
  var panel = document.getElementById('playlistBrowser');
  var overlay = document.getElementById('playlistBrowserOverlay');
  if (!panel) return;
  var isOpen = panel.style.display === 'flex';
  if (isOpen) { panel.style.display = 'none'; overlay.style.display = 'none'; }
  else { panel.style.display = 'flex'; overlay.style.display = 'block'; plBrowserShowList(); }
};

window.plBrowserShowList = async function() {
  var content = document.getElementById('plBrowserContent');
  document.getElementById('plBrowserBack').style.display = 'none';
  document.getElementById('plBrowserTitle').textContent = '我的歌单';
  content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">加载中…</div>';
  try {
    var r = await fetch(API_BASE + '/api/playlists', { headers: apiHeaders() });
    var playlists = await r.json();
    content.innerHTML = '';
    if (!playlists.length) { content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:32px;">还没有歌单</div>'; return; }
    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;';
    playlists.forEach(function(pl) {
      var card = document.createElement('div');
      card.style.cssText = 'background:' + (pl.cover_color||'#333') + '22;border:1px solid ' + (pl.cover_color||'#333') + '44;border-radius:14px;padding:18px 14px;cursor:pointer;text-align:center;';
      card.innerHTML = '<div style="font-size:1.8rem;margin-bottom:8px;">' + (pl.cover_emoji||'♪') + '</div><div style="font-size:0.85rem;font-weight:600;color:white;margin-bottom:4px;">' + esc(pl.name) + '</div><div style="font-size:0.68rem;color:rgba(255,255,255,0.35);">' + (pl.song_count||0) + ' 首</div>';
      card.onclick = (function(p){ return function(){ plBrowserShowSongs(p); }; })(pl);
      grid.appendChild(card);
    });
    content.appendChild(grid);
  } catch(e) { content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">加载失败</div>'; }
};

window.plBrowserShowSongs = async function(pl) {
  var content = document.getElementById('plBrowserContent');
  document.getElementById('plBrowserBack').style.display = 'block';
  document.getElementById('plBrowserTitle').textContent = (pl.cover_emoji||'') + ' ' + (pl.name||'歌单');
  content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">加载中…</div>';
  try {
    var r = await fetch(API_BASE + '/api/playlists/' + pl.id + '/songs', { headers: apiHeaders() });
    var songs = await r.json();
    content.innerHTML = '';
    if (!songs.length) { content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:32px;">歌单里还没有歌</div>'; return; }
    // Set queue
    _lpQueue = { songs: songs.map(function(s){ return { id:s.song_id, name:s.song_name, artist:s.artist, pic:s.cover_url||'' }; }) };
    songs.forEach(function(s, i) {
      var isCur = String(s.song_id) === String(_lp.id);
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 4px;cursor:pointer;border-radius:10px;' + (isCur?'background:rgba(255,255,255,0.07);':'');
      var idx = document.createElement('div');
      idx.style.cssText = 'width:22px;text-align:center;font-size:0.72rem;color:' + (isCur?'white':'rgba(255,255,255,0.25)') + ';flex-shrink:0;';
      idx.textContent = isCur ? '▶' : (i+1);
      var thumb = document.createElement('div');
      thumb.style.cssText = 'width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:1rem;';
      if (s.cover_url) { var img = document.createElement('img'); img.src = s.cover_url; img.style.cssText='width:100%;height:100%;object-fit:cover;'; thumb.appendChild(img); } else { thumb.textContent = '♪'; }
      var info = document.createElement('div'); info.style.cssText = 'flex:1;min-width:0;';
      var nm = document.createElement('div'); nm.style.cssText = 'font-size:0.82rem;font-weight:' + (isCur?'700':'500') + ';color:' + (isCur?'white':'rgba(255,255,255,0.8)') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'; nm.textContent = s.song_name||'';
      var ar = document.createElement('div'); ar.style.cssText = 'font-size:0.68rem;color:rgba(255,255,255,0.35);margin-top:2px;display:flex;gap:6px;align-items:center;overflow:hidden;';
      var arTxt = document.createElement('span'); arTxt.style.cssText='white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;'; arTxt.textContent = s.artist||'';
      ar.appendChild(arTxt);
      var _pc = parseInt(s.play_count)||0;
      if (_pc > 0) { var pcEl = document.createElement('span'); pcEl.style.cssText='color:rgba(255,255,255,0.25);font-size:0.6rem;flex-shrink:0;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:6px;'; pcEl.textContent=_pc+'次'; ar.appendChild(pcEl); }
      info.appendChild(nm); info.appendChild(ar);
      row.appendChild(idx); row.appendChild(thumb); row.appendChild(info);
      row.onclick = (function(song){ return function(){ togglePlaylistBrowser(); openLyricPlayer(song.song_id, song.song_name, song.artist, song.cover_url||'', ''); }; })(s);
      content.appendChild(row);
    });
  } catch(e) { content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">加载失败</div>'; }
};

// ── Search from lyric player input ──
window.lpSearchFromInput = async function() {
  var input = document.getElementById('lpChatInput');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';
  try {
    var r = await fetch(API_BASE + '/api/music/search?q=' + encodeURIComponent(q), { headers: apiHeaders() });
    var songs = await r.json();
    if (songs && songs[0]) {
      var s = songs[0];
      _chatCardQueue.push({ id: String(s.id), name: s.name, artist: s.artist, pic: s.pic, play_url: s.play_url });
      openLyricPlayer(s.id, s.name, s.artist, s.pic, s.play_url || '');
    }
  } catch(e) {}
};
